<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>NexLog Admin — Control Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --navy: #0A1628; --navy2: #0F2040; --gold: #C9922A; --gold2: #E8B84B;
      --white: #F8F6F1; --gray: #A8A89E; --dark: #050E1A; --card-bg: #0D1E35;
      --border: rgba(201,146,42,0.2);
      --font-head: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
      --transition: 0.25s ease;
    }
    body { background: var(--navy); color: var(--white); font-family: var(--font-body); font-weight: 400; line-height: 1.5; }
    .admin-wrapper { max-width: 1400px; margin: 0 auto; padding: 24px 32px 60px; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; padding-bottom: 24px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
    .logo-area { display: flex; align-items: center; gap: 12px; }
    .logo-mark { width: 44px; height: 44px; background: linear-gradient(135deg, var(--gold), var(--gold2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: var(--font-head); font-weight: 800; font-size: 20px; color: var(--dark); }
    .logo-text { font-family: var(--font-head); font-weight: 700; font-size: 20px; }
    .logo-text span { color: var(--gold2); }
    .admin-badge { background: var(--gold); color: var(--dark); padding: 6px 14px; border-radius: 40px; font-size: 12px; font-weight: 600; letter-spacing: 0.5px; }
    .logout-btn { background: transparent; border: 1px solid var(--border); color: var(--gray); padding: 8px 20px; border-radius: 30px; font-weight: 500; cursor: pointer; transition: var(--transition); font-family: var(--font-body); }
    .logout-btn:hover { border-color: var(--gold); color: var(--gold); }
    .tabs-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 36px; background: rgba(5, 14, 26, 0.6); padding: 8px 12px; border-radius: 24px; backdrop-filter: blur(4px); border: 1px solid var(--border); }
    .tab-btn { background: transparent; border: none; color: var(--gray); font-family: var(--font-head); font-weight: 600; font-size: 13px; letter-spacing: 0.5px; padding: 10px 20px; border-radius: 40px; cursor: pointer; transition: var(--transition); white-space: nowrap; }
    .tab-btn i { margin-right: 8px; }
    .tab-btn.active { background: var(--gold); color: var(--dark); box-shadow: 0 4px 12px rgba(201,146,42,0.3); }
    .admin-panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 28px 32px; margin-bottom: 20px; box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3); }
    .panel-title { font-family: var(--font-head); font-weight: 700; font-size: 22px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
    .panel-desc { color: var(--gray); font-size: 13px; margin-bottom: 28px; border-left: 3px solid var(--gold); padding-left: 16px; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 28px; }
    .input-group { display: flex; flex-direction: column; gap: 8px; }
    .input-group label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; color: var(--gold); }
    input, textarea, select { background: var(--navy); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; color: var(--white); font-family: var(--font-body); font-size: 14px; transition: var(--transition); width: 100%; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 2px rgba(201,146,42,0.2); }
    textarea { resize: vertical; min-height: 80px; }
    button.btn-primary { background: var(--gold); border: none; color: var(--dark); font-family: var(--font-head); font-weight: 700; padding: 12px 28px; border-radius: 40px; cursor: pointer; transition: var(--transition); font-size: 14px; display: inline-flex; align-items: center; gap: 8px; }
    button.btn-primary:hover { background: var(--gold2); transform: translateY(-2px); }
    button.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--gray); padding: 8px 18px; border-radius: 40px; cursor: pointer; transition: var(--transition); font-family: var(--font-body); font-size: 13px; }
    button.btn-outline:hover { border-color: var(--gold); color: var(--gold); }
    .dynamic-list { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 24px; }
    .list-item-card { background: rgba(10,22,40,0.6); border-radius: 20px; padding: 20px; margin-bottom: 16px; border: 1px solid var(--border); }
    .list-item-card .form-grid { margin-bottom: 16px; }
    .item-actions { display: flex; gap: 12px; justify-content: flex-end; }
    .icon-btn { background: none; border: 1px solid var(--border); color: var(--gray); font-size: 13px; cursor: pointer; transition: var(--transition); padding: 8px 16px; border-radius: 30px; display: inline-flex; align-items: center; gap: 6px; }
    .icon-btn.danger:hover { color: #fff; background: #B33A3A; border-color: #B33A3A; }
    .icon-btn:hover { color: var(--gold); border-color: var(--gold); }
    .add-new-btn { margin: 16px 0 8px; width: 100%; background: rgba(201,146,42,0.1); border: 1px dashed var(--border); border-radius: 16px; padding: 14px; text-align: center; color: var(--gold); font-weight: 600; cursor: pointer; transition: var(--transition); }
    .add-new-btn:hover { background: rgba(201,146,42,0.18); border-color: var(--gold); }
    .image-preview { width: 100%; max-width: 220px; height: 110px; object-fit: cover; border-radius: 12px; background: var(--dark); border: 1px solid var(--border); margin-bottom: 10px; }
    .upload-row { display: flex; gap: 10px; align-items: center; margin-top: 6px; }
    .toast-msg { position: fixed; bottom: 24px; right: 24px; background: var(--gold); color: var(--dark); padding: 12px 24px; border-radius: 40px; font-weight: 600; z-index: 2000; animation: fadeUp 0.3s ease; max-width: 80vw; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px);} to { opacity: 1; transform: translateY(0);} }
    .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--navy); }
    .login-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 32px; padding: 48px 40px; width: 400px; max-width: 90%; text-align: center; }
    hr { border-color: var(--border); margin: 18px 0; border-width: 1px 0 0; }
    @media (max-width: 700px) { .admin-wrapper { padding: 16px; } .admin-panel { padding: 20px; } }
    .lang-tab-btn { padding: 8px 16px; border-radius: 30px; border: 1px solid var(--border); background: transparent; color: var(--gray); cursor: pointer; transition: var(--transition); font-family: var(--font-body); font-size: 13px; }
    .lang-tab-btn:hover { border-color: var(--gold); color: var(--gold); }
    .lang-tab-btn.active { background: var(--gold); color: var(--dark); }
    input[type="color"] { cursor: pointer; border: 1px solid var(--border); background: var(--navy); padding: 4px; height: 44px; }
    .checkbox-row { display: flex; align-items: center; gap: 10px; }
    .checkbox-row input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--gold); cursor: pointer; }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--gray); }
  </style>
</head>
<body>
<div id="app-root"></div>

<script>
  let authToken = localStorage.getItem('admin_token') || null;
  let currentTab = 'site';
  let state = {
    site: null, heroSlides: [], stats: [], about: null, services: [], news: [], partners: [], contact: null,
    languages: {}, sidepanel: null
  };

  function showMessage(msg, isError = false) {
    const toast = document.createElement('div');
    toast.className = 'toast-msg';
    toast.style.background = isError ? '#B33A3A' : 'var(--gold)';
    toast.style.color = isError ? '#fff' : 'var(--dark)';
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2800);
  }

  function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[m]); }

  async function apiCall(endpoint, options = {}) {
    const headers = { 'Content-Type': 'application/json' };
    if (authToken && !endpoint.includes('/login')) headers['Authorization'] = `Bearer ${authToken}`;
    const res = await fetch(endpoint, { ...options, headers });
    if (res.status === 401) {
      localStorage.removeItem('admin_token');
      authToken = null;
      renderLogin();
      throw new Error('Session expired — please log in again');
    }
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `Request failed (${res.status})`);
    }
    return res.json();
  }

  async function uploadImage(file) {
    const formData = new FormData();
    formData.append('image', file);
    const res = await fetch('/api/admin/upload', { method: 'POST', headers: { 'Authorization': `Bearer ${authToken}` }, body: formData });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || 'Upload failed');
    }
    const data = await res.json();
    return data.url;
  }

  async function fetchAllData() {
    try {
      const [content, langs, sidepanel] = await Promise.all([
        apiCall('/api/content'), apiCall('/api/languages'), apiCall('/api/sidepanel')
      ]);
      state.site = content.site;
      state.heroSlides = content.hero.slides || [];
      state.stats = content.stats || [];
      state.about = content.about;
      state.services = content.services || [];
      state.news = content.news || [];
      state.partners = content.partners || [];
      state.contact = content.contact;
      state.languages = langs || {};
      state.sidepanel = sidepanel || { enabled: true, position: 'right', label: 'Contact Us', color: '#C9922A', channels: [] };
      renderAdminPanel();
    } catch (err) {
      showMessage('Error loading data: ' + err.message, true);
    }
  }

  async function saveSite(data)      { await apiCall('/api/admin/site', { method:'PUT', body: JSON.stringify(data) }); showMessage('✅ Site saved'); await fetchAllData(); }
  async function saveHero(slides)    { await apiCall('/api/admin/hero', { method:'PUT', body: JSON.stringify({ slides }) }); showMessage('✅ Hero slides saved'); await fetchAllData(); }
  async function saveStats(stats)    { await apiCall('/api/admin/stats', { method:'PUT', body: JSON.stringify(stats) }); showMessage('✅ Stats saved'); await fetchAllData(); }
  async function saveAbout(about)    { await apiCall('/api/admin/about', { method:'PUT', body: JSON.stringify(about) }); showMessage('✅ About saved'); await fetchAllData(); }
  async function saveServices(list)  { await apiCall('/api/admin/services', { method:'PUT', body: JSON.stringify(list) }); showMessage('✅ Services saved'); await fetchAllData(); }
  async function saveNews(list)      { await apiCall('/api/admin/news', { method:'PUT', body: JSON.stringify(list) }); showMessage('✅ News saved'); await fetchAllData(); }
  async function savePartners(list)  { await apiCall('/api/admin/partners', { method:'PUT', body: JSON.stringify(list) }); showMessage('✅ Partners saved'); await fetchAllData(); }
  async function saveContact(c)      { await apiCall('/api/admin/contact', { method:'PUT', body: JSON.stringify(c) }); showMessage('✅ Contact saved'); await fetchAllData(); }
  async function saveLanguages(l)    { await apiCall('/api/admin/languages', { method:'PUT', body: JSON.stringify(l) }); showMessage('✅ Languages saved'); await fetchAllData(); }
  async function saveSidepanel(cfg)  { await apiCall('/api/admin/sidepanel', { method:'PUT', body: JSON.stringify(cfg) }); showMessage('✅ Side panel saved'); await fetchAllData(); }
  async function changeAdminPassword(p) { await apiCall('/api/admin/change-password', { method:'POST', body: JSON.stringify({ newPassword: p }) }); showMessage('✅ Password changed'); }

  // ===== LOGIN =====
  function renderLogin() {
    const root = document.getElementById('app-root');
    root.innerHTML = `
      <div class="login-container">
        <div class="login-card">
          <div class="logo-area" style="justify-content:center;margin-bottom:28px;"><div class="logo-mark">NL</div><div class="logo-text">NexLog <span>Admin</span></div></div>
          <h3 style="font-family:var(--font-head);margin-bottom:16px;">🔐 Secure Access</h3>
          <input type="password" id="admin-password" placeholder="Enter password" style="margin-bottom:20px;">
          <button class="btn-primary" id="login-btn" style="width:100%;justify-content:center;"><i class="fas fa-lock"></i> Login</button>
          <hr><p style="font-size:12px;color:var(--gray);">Default: <strong style="color:var(--gold)">password</strong></p>
        </div>
      </div>`;
    const pwInput = document.getElementById('admin-password');
    const doLogin = async () => {
      const pwd = pwInput.value;
      if (!pwd) return showMessage('Enter password', true);
      try {
        const res = await fetch('/api/admin/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ password: pwd }) });
        if (!res.ok) throw new Error('Invalid password');
        const data = await res.json();
        authToken = data.token;
        localStorage.setItem('admin_token', authToken);
        showMessage('✅ Login successful');
        await fetchAllData();
      } catch (err) { showMessage('Login failed: ' + err.message, true); }
    };
    document.getElementById('login-btn').addEventListener('click', doLogin);
    pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  }

  // ===== MAIN PANEL =====
  function renderAdminPanel() {
    const root = document.getElementById('app-root');
    root.innerHTML = `
      <div class="admin-wrapper">
        <div class="admin-header">
          <div class="logo-area"><div class="logo-mark">NL</div><div class="logo-text">NexLog <span>Admin Core</span></div><div class="admin-badge"><i class="fas fa-shield-alt"></i> CMS</div></div>
          <button class="logout-btn" id="global-logout"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
        <div class="tabs-bar" id="tabs-container"></div>
        <div id="dynamic-panel"></div>
      </div>`;
    const tabs = [
      { id:'site', label:'Site', icon:'fa-globe' }, { id:'hero', label:'Hero', icon:'fa-images' }, { id:'stats', label:'Stats', icon:'fa-chart-line' },
      { id:'about', label:'About', icon:'fa-building' }, { id:'services', label:'Services', icon:'fa-boxes' }, { id:'news', label:'News', icon:'fa-newspaper' },
      { id:'partners', label:'Partners', icon:'fa-handshake' }, { id:'contact', label:'Contact', icon:'fa-address-card' }, { id:'languages', label:'Languages', icon:'fa-language' },
      { id:'sidepanel', label:'Side Panel', icon:'fa-comments' }, { id:'password', label:'Security', icon:'fa-key' }
    ];
    document.getElementById('tabs-container').innerHTML = tabs.map(tab =>
      `<button class="tab-btn ${currentTab===tab.id?'active':''}" data-tab="${tab.id}"><i class="fas ${tab.icon}"></i> ${tab.label}</button>`
    ).join('');
    document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => { currentTab = btn.dataset.tab; renderAdminPanel(); }));
    document.getElementById('global-logout').addEventListener('click', () => { localStorage.removeItem('admin_token'); authToken = null; renderLogin(); });
    renderCurrentTabContent();
  }

  function renderCurrentTabContent() {
    const panelDiv = document.getElementById('dynamic-panel');
    switch (currentTab) {
      case 'site':      renderSiteEditor(panelDiv); break;
      case 'hero':      renderHeroEditor(panelDiv); break;
      case 'stats':     renderStatsEditor(panelDiv); break;
      case 'about':     renderAboutEditor(panelDiv); break;
      case 'services':  renderArrayEditor(panelDiv, 'services', state.services, [
                            {key:'title',label:'Title'}, {key:'description',label:'Description',type:'textarea'},
                            {key:'icon',label:'Icon (emoji)'}, {key:'image',label:'Image URL',type:'image'}
                         ], saveServices, { title:'', description:'', icon:'📦', image:'' }); break;
      case 'news':      renderArrayEditor(panelDiv, 'news', state.news, [
                            {key:'title',label:'Title'}, {key:'date',label:'Date'},
                            {key:'excerpt',label:'Excerpt',type:'textarea'}, {key:'image',label:'Image URL',type:'image'}
                         ], saveNews, { title:'', date:'', excerpt:'', image:'' }); break;
      case 'partners':  renderArrayEditor(panelDiv, 'partners', state.partners, [
                            {key:'name',label:'Name'}, {key:'logo',label:'Logo URL',type:'image'}
                         ], savePartners, { name:'', logo:'' }); break;
      case 'contact':   renderContactEditor(panelDiv); break;
      case 'password':  renderPasswordEditor(panelDiv); break;
      case 'languages': renderLanguagesEditor(panelDiv); break;
      case 'sidepanel': renderSidePanelEditor(panelDiv); break;
    }
  }

  function attachUploadTriggers(scope) {
    (scope || document).querySelectorAll('.upload-trigger').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
        input.onchange = async e => {
          const file = e.target.files[0]; if (!file) return;
          try {
            showMessage('Uploading...');
            const url = await uploadImage(file);
            const targetId = btn.getAttribute('data-target');
            const targetInput = document.getElementById(targetId);
            if (targetInput) { targetInput.value = url; targetInput.dispatchEvent(new Event('input')); }
            const preview = document.getElementById(`preview-${targetId}`);
            if (preview) preview.src = url;
            showMessage('✅ Image uploaded');
          } catch (err) { showMessage('Upload error: ' + err.message, true); }
        };
        input.click();
      });
    });
  }

  // ===== SITE =====
  function renderSiteEditor(panel) {
    const s = state.site;
    panel.innerHTML = `<div class="admin-panel">
      <div class="panel-title"><i class="fas fa-cog"></i> General Settings</div>
      <div class="panel-desc">Company name and tagline shown across the site.</div>
      <div class="form-grid">
        <div class="input-group"><label>Company Name</label><input id="site-name" value="${escapeHtml(s.companyName)}"></div>
        <div class="input-group"><label>Tagline</label><input id="site-tagline" value="${escapeHtml(s.tagline)}"></div>
      </div>
      <button class="btn-primary" id="save-site-btn"><i class="fas fa-save"></i> Save</button>
    </div>`;
    document.getElementById('save-site-btn').addEventListener('click', () =>
      saveSite({ companyName: document.getElementById('site-name').value, tagline: document.getElementById('site-tagline').value })
    );
  }

  // ===== HERO =====
  function renderHeroEditor(panel) {
    const slides = state.heroSlides;
    const itemsHtml = slides.length ? slides.map((slide, idx) => `
      <div class="list-item-card" data-idx="${idx}">
        <div class="form-grid">
          <div class="input-group"><label>Title</label><input id="hero-${idx}-title" value="${escapeHtml(slide.title)}"></div>
          <div class="input-group"><label>Subtitle</label><input id="hero-${idx}-subtitle" value="${escapeHtml(slide.subtitle)}"></div>
          <div class="input-group"><label>Button Text</label><input id="hero-${idx}-buttonText" value="${escapeHtml(slide.buttonText)}"></div>
          <div class="input-group"><label>Button Link</label><input id="hero-${idx}-buttonLink" value="${escapeHtml(slide.buttonLink)}"></div>
        </div>
        <div class="input-group" style="margin-bottom:16px;">
          <label>Image</label>
          <img id="preview-hero-${idx}-image" class="image-preview" src="${slide.image||''}" onerror="this.style.opacity=0.3">
          <div class="upload-row">
            <input id="hero-${idx}-image" value="${escapeHtml(slide.image)}" placeholder="/uploads/...">
            <button class="btn-outline upload-trigger" data-target="hero-${idx}-image"><i class="fas fa-upload"></i> Upload</button>
          </div>
        </div>
        <div class="item-actions"><button class="icon-btn danger remove-slide" data-idx="${idx}"><i class="fas fa-trash"></i> Remove</button></div>
      </div>`).join('') : '<div class="empty-state">No slides yet. Add one below.</div>';

    panel.innerHTML = `<div class="admin-panel">
      <div class="panel-title"><i class="fas fa-sliders-h"></i> Hero Slides</div>
      <div class="panel-desc">These slides appear on the homepage. Title/subtitle can be overridden per-language in the Languages tab (slide_title, slide_subtitle, slide_btn_text).</div>
      <div id="hero-list">${itemsHtml}</div>
      <div class="add-new-btn" id="add-hero-slide"><i class="fas fa-plus"></i> Add Slide</div>
      <button class="btn-primary" id="save-hero-btn"><i class="fas fa-save"></i> Save All Slides</button>
    </div>`;

    attachUploadTriggers(panel);

    document.getElementById('add-hero-slide').addEventListener('click', () => {
      state.heroSlides.push({ title:'New Slide', subtitle:'Subtitle here', image:'', buttonText:'Explore', buttonLink:'#contact' });
      renderHeroEditor(panel);
    });
    panel.querySelectorAll('.remove-slide').forEach(btn => btn.addEventListener('click', () => {
      state.heroSlides.splice(parseInt(btn.dataset.idx), 1);
      renderHeroEditor(panel);
    }));
    document.getElementById('save-hero-btn').addEventListener('click', async () => {
      const updated = state.heroSlides.map((_, idx) => ({
        title: document.getElementById(`hero-${idx}-title`).value,
        subtitle: document.getElementById(`hero-${idx}-subtitle`).value,
        image: document.getElementById(`hero-${idx}-image`).value,
        buttonText: document.getElementById(`hero-${idx}-buttonText`).value,
        buttonLink: document.getElementById(`hero-${idx}-buttonLink`).value,
      }));
      await saveHero(updated);
    });
  }

  // ===== STATS =====
  function renderStatsEditor(panel) {
    const stats = state.stats;
    const itemsHtml = stats.length ? stats.map((s, i) => `
      <div class="list-item-card">
        <div class="form-grid">
          <div class="input-group"><label>Icon (emoji)</label><input id="stat-icon-${i}" value="${escapeHtml(s.icon)}"></div>
          <div class="input-group"><label>Value</label><input id="stat-value-${i}" value="${escapeHtml(s.value)}"></div>
          <div class="input-group"><label>Label</label><input id="stat-label-${i}" value="${escapeHtml(s.label)}"></div>
        </div>
        <div class="item-actions"><button class="icon-btn danger remove-stat" data-idx="${i}"><i class="fas fa-trash"></i> Remove</button></div>
      </div>`).join('') : '<div class="empty-state">No stats yet. Add one below.</div>';

    panel.innerHTML = `<div class="admin-panel">
      <div class="panel-title"><i class="fas fa-chart-line"></i> Stats Counter</div>
      <div class="panel-desc">Shown as a stats bar under the hero section.</div>
      <div id="stats-list">${itemsHtml}</div>
      <div class="add-new-btn" id="add-stat"><i class="fas fa-plus"></i> Add Stat</div>
      <button class="btn-primary" id="save-stats-btn"><i class="fas fa-save"></i> Save All Stats</button>
    </div>`;

    document.getElementById('add-stat').addEventListener('click', () => {
      state.stats.push({ icon:'🌟', value:'100+', label:'New Stat' });
      renderStatsEditor(panel);
    });
    panel.querySelectorAll('.remove-stat').forEach(btn => btn.addEventListener('click', () => {
      state.stats.splice(parseInt(btn.dataset.idx), 1);
      renderStatsEditor(panel);
    }));
    document.getElementById('save-stats-btn').addEventListener('click', async () => {
      const updated = state.stats.map((_, i) => ({
        icon: document.getElementById(`stat-icon-${i}`).value,
        value: document.getElementById(`stat-value-${i}`).value,
        label: document.getElementById(`stat-label-${i}`).value,
      }));
      await saveStats(updated);
    });
  }

  // ===== ABOUT =====
  function renderAboutEditor(panel) {
    const a = state.about;
    panel.innerHTML = `<div class="admin-panel">
      <div class="panel-title"><i class="fas fa-building"></i> About Section</div>
      <div class="form-grid">
        <div class="input-group"><label>Title</label><input id="about-title" value="${escapeHtml(a.title)}"></div>
        <div class="input-group" style="grid-column:1/-1;"><label>Description</label><textarea id="about-desc">${escapeHtml(a.description)}</textarea></div>
      </div>
      <div class="input-group" style="margin-bottom:24px;max-width:400px;">
        <label>Image</label>
        <img id="preview-about-img" class="image-preview" src="${a.image||''}" onerror="this.style.opacity=0.3">
        <div class="upload-row">
          <input id="about-img" value="${escapeHtml(a.image)}" placeholder="/uploads/...">
          <button class="btn-outline upload-trigger" data-target="about-img"><i class="fas fa-upload"></i> Upload</button>
        </div>
      </div>
      <button class="btn-primary" id="save-about-btn"><i class="fas fa-save"></i> Save</button>
    </div>`;
    attachUploadTriggers(panel);
    document.getElementById('save-about-btn').addEventListener('click', () => saveAbout({
      title: document.getElementById('about-title').value,
      description: document.getElementById('about-desc').value,
      image: document.getElementById('about-img').value,
    }));
  }

  // ===== GENERIC ARRAY EDITOR (services / news / partners) =====
  function renderArrayEditor(panel, type, items, fields, saveFn, emptyTemplate) {
    function refresh() {
      const itemsHtml = items.length ? items.map((item, idx) => `
        <div class="list-item-card" data-idx="${idx}">
          <div class="form-grid">
            ${fields.map(f => {
              if (f.type === 'textarea') {
                return `<div class="input-group" style="grid-column:1/-1;"><label>${f.label}</label><textarea id="${type}-${idx}-${f.key}">${escapeHtml(item[f.key]||'')}</textarea></div>`;
              }
              if (f.type === 'image') {
                return `<div class="input-group" style="grid-column:1/-1;max-width:340px;">
                  <label>${f.label}</label>
                  <img id="preview-${type}-${idx}-${f.key}" class="image-preview" src="${item[f.key]||''}" onerror="this.style.opacity=0.3">
                  <div class="upload-row">
                    <input id="${type}-${idx}-${f.key}" value="${escapeHtml(item[f.key]||'')}" placeholder="/uploads/...">
                    <button class="btn-outline upload-trigger" data-target="${type}-${idx}-${f.key}"><i class="fas fa-upload"></i> Upload</button>
                  </div>
                </div>`;
              }
              return `<div class="input-group"><label>${f.label}</label><input id="${type}-${idx}-${f.key}" value="${escapeHtml(item[f.key]||'')}"></div>`;
            }).join('')}
          </div>
          <div class="item-actions"><button class="icon-btn danger remove-${type}" data-idx="${idx}"><i class="fas fa-trash"></i> Remove</button></div>
        </div>`).join('') : `<div class="empty-state">No ${type} yet. Add one below.</div>`;

      document.getElementById(`${type}-list`).innerHTML = itemsHtml;
      attachUploadTriggers(panel);
      panel.querySelectorAll(`.remove-${type}`).forEach(btn => btn.addEventListener('click', () => {
        items.splice(parseInt(btn.dataset.idx), 1);
        refresh();
      }));
    }

    panel.innerHTML = `<div class="admin-panel">
      <div class="panel-title"><i class="fas fa-list"></i> ${type.charAt(0).toUpperCase()+type.slice(1)}</div>
      <div id="${type}-list"></div>
      <div class="add-new-btn" id="add-${type}"><i class="fas fa-plus"></i> Add ${type.slice(0,-1)}</div>
      <button class="btn-primary" id="save-${type}-btn"><i class="fas fa-save"></i> Save All</button>
    </div>`;

    refresh();

    document.getElementById(`add-${type}`).addEventListener('click', () => {
      items.push({ ...emptyTemplate });
      refresh();
    });
    document.getElementById(`save-${type}-btn`).addEventListener('click', async () => {
      const updated = items.map((_, idx) => Object.fromEntries(fields.map(f => [f.key, document.getElementById(`${type}-${idx}-${f.key}`)?.value || ''])));
      await saveFn(updated);
    });
  }

  // ===== CONTACT =====
  function renderContactEditor(panel) {
    const c = state.contact;
    panel.innerHTML = `<div class="admin-panel">
      <div class="panel-title"><i class="fas fa-address-card"></i> Contact Info</div>
      <div class="panel-desc">Shown in the footer of the site.</div>
      <div class="form-grid">
        <div class="input-group"><label>Address</label><input id="contact-address" value="${escapeHtml(c.address)}"></div>
        <div class="input-group"><label>Phone</label><input id="contact-phone" value="${escapeHtml(c.phone)}"></div>
        <div class="input-group"><label>Email</label><input id="contact-email" value="${escapeHtml(c.email)}"></div>
        <div class="input-group"><label>WhatsApp</label><input id="contact-wa" value="${escapeHtml(c.whatsapp)}"></div>
      </div>
      <button class="btn-primary" id="save-contact-btn"><i class="fas fa-save"></i> Save</button>
    </div>`;
    document.getElementById('save-contact-btn').addEventListener('click', () => saveContact({
      address: document.getElementById('contact-address').value,
      phone: document.getElementById('contact-phone').value,
      email: document.getElementById('contact-email').value,
      whatsapp: document.getElementById('contact-wa').value,
    }));
  }

  // ===== PASSWORD =====
  function renderPasswordEditor(panel) {
    panel.innerHTML = `<div class="admin-panel">
      <div class="panel-title"><i class="fas fa-key"></i> Change Password</div>
      <div class="panel-desc">Minimum 6 characters. You'll need to log in again after changing it.</div>
      <div class="input-group" style="max-width:320px;margin-bottom:20px;">
        <label>New Password</label>
        <input type="password" id="new-pass" placeholder="••••••••">
      </div>
      <button class="btn-primary" id="change-pass-btn"><i class="fas fa-save"></i> Update Password</button>
    </div>`;
    document.getElementById('change-pass-btn').addEventListener('click', async () => {
      const p = document.getElementById('new-pass').value;
      if (p.length < 6) return showMessage('Password must be at least 6 characters', true);
      await changeAdminPassword(p);
      document.getElementById('new-pass').value = '';
    });
  }

  // ===== LANGUAGES =====
  const LANG_KEYS = [
    { key:'nav_home', label:'Nav: Home' }, { key:'nav_about', label:'Nav: About' }, { key:'nav_services', label:'Nav: Services' },
    { key:'nav_news', label:'Nav: News' }, { key:'nav_quote', label:'Nav: Get Quote' },
    { key:'eyebrow_who', label:'Eyebrow: Who We Are' }, { key:'eyebrow_offer', label:'Eyebrow: What We Offer' },
    { key:'eyebrow_updates', label:'Eyebrow: Latest Updates' }, { key:'eyebrow_partners', label:'Eyebrow: Trusted By' },
    { key:'eyebrow_touch', label:'Eyebrow: Get In Touch' },
    { key:'sec_about', label:'Section: About Us' }, { key:'sec_services', label:'Section: Our Services' },
    { key:'sec_news', label:'Section: Our News' }, { key:'sec_partners', label:'Section: Our Key Partners' },
    { key:'cta_title', label:'CTA Title' }, { key:'cta_sub', label:'CTA Subtitle' }, { key:'cta_btn', label:'CTA Button' },
    { key:'about_btn', label:'About Button' },
    { key:'slide_tag', label:'Hero: Tag Badge' }, { key:'slide_title', label:'Hero: Main Title' },
    { key:'slide_subtitle', label:'Hero: Subtitle' }, { key:'slide_btn_text', label:'Hero: Button Text' },
    { key:'footer_services', label:'Footer: Services Heading' }, { key:'footer_company', label:'Footer: Company Heading' },
    { key:'footer_team', label:'Footer: Team Link' }, { key:'footer_careers', label:'Footer: Careers Link' },
    { key:'footer_news', label:'Footer: News Link' }, { key:'footer_contact', label:'Footer: Contact Heading' },
    { key:'footer_tagline', label:'Footer: Tagline Text' },
    { key:'years', label:'About Badge: "Years" Label' },
    { key:'page_title', label:'Browser Tab Title' }, { key:'rights', label:'Footer: "All Rights Reserved"' },
  ];

  function renderLanguagesEditor(panel) {
    let editingLang = Object.keys(state.languages)[0] || 'en';

    function render() {
      const langs = state.languages;
      const tabsHtml = Object.entries(langs).map(([code, l]) =>
        `<button class="lang-tab-btn ${code===editingLang?'active':''}" data-code="${code}">${l.flag||'🌐'} ${l.name||code}</button>`
      ).join('');

      panel.innerHTML = `<div class="admin-panel">
        <div class="panel-title"><i class="fas fa-language"></i> Languages</div>
        <div class="panel-desc">Edit translations for each language. Changes save to the server and sync to all visitors.</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;">
          ${tabsHtml}
          <button class="lang-tab-btn" id="add-lang-btn" style="border-style:dashed;color:var(--gold);"><i class="fas fa-plus"></i> Add Language</button>
        </div>
        <div id="lang-editor-area"></div>
        <div style="margin-top:24px;display:flex;gap:12px;">
          <button id="save-langs-btn" class="btn-primary"><i class="fas fa-save"></i> Save All Languages</button>
          ${Object.keys(langs).length > 1 ? `<button id="delete-lang-btn" class="icon-btn danger"><i class="fas fa-trash"></i> Delete "${editingLang}"</button>` : ''}
        </div>
      </div>`;

      panel.querySelectorAll('.lang-tab-btn[data-code]').forEach(btn =>
        btn.addEventListener('click', () => { editingLang = btn.dataset.code; render(); })
      );

      document.getElementById('add-lang-btn').addEventListener('click', () => {
        const code = prompt('Language code (e.g. "fr", "de", "ko"):');
        if (!code || !code.trim()) return;
        const cleanCode = code.trim().toLowerCase();
        if (state.languages[cleanCode]) { showMessage('Language already exists', true); return; }
        const name = prompt('Language display name (e.g. "Français"):') || cleanCode.toUpperCase();
        const flag = prompt('Flag emoji (e.g. 🇫🇷):', '🌐') || '🌐';
        state.languages[cleanCode] = { flag, name, ...Object.fromEntries(LANG_KEYS.map(k => [k.key, ''])) };
        editingLang = cleanCode;
        render();
      });

      const deleteBtn = document.getElementById('delete-lang-btn');
      if (deleteBtn) {
        deleteBtn.addEventListener('click', () => {
          if (!confirm(`Delete language "${editingLang}"? This cannot be undone.`)) return;
          delete state.languages[editingLang];
          editingLang = Object.keys(state.languages)[0];
          render();
        });
      }

      const area = document.getElementById('lang-editor-area');
      const current = langs[editingLang] || {};
      area.innerHTML = `
        <div class="form-grid" style="margin-bottom:20px;">
          <div class="input-group"><label>Flag Emoji</label><input id="lang-meta-flag" value="${escapeHtml(current.flag||'')}"></div>
          <div class="input-group"><label>Display Name</label><input id="lang-meta-name" value="${escapeHtml(current.name||'')}"></div>
        </div>
        <div style="font-weight:700;margin-bottom:16px;color:var(--gold);font-family:var(--font-head);">Translations</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;">
          ${LANG_KEYS.map(({key,label}) => `<div class="input-group"><label>${label}</label><input id="lang-${key}" value="${escapeHtml(current[key]||'')}" placeholder="Translation..."></div>`).join('')}
        </div>`;

      document.getElementById('save-langs-btn').addEventListener('click', async () => {
        const updated = { ...state.languages };
        if (editingLang && updated[editingLang]) {
          const curr = { ...updated[editingLang] };
          curr.flag = document.getElementById('lang-meta-flag').value;
          curr.name = document.getElementById('lang-meta-name').value;
          LANG_KEYS.forEach(({key}) => { curr[key] = document.getElementById(`lang-${key}`).value; });
          updated[editingLang] = curr;
        }
        await saveLanguages(updated);
      });
    }
    render();
  }

  // ===== SIDE PANEL =====
  function renderSidePanelEditor(panel) {
    let cfg = JSON.parse(JSON.stringify(state.sidepanel || { enabled:true, position:'right', label:'Contact Us', color:'#C9922A', channels:[] }));
    const CONTACT_CHANNELS = [
      { type:'phone', label:'Phone', icon:'📞', linkPrefix:'tel:' },
      { type:'whatsapp', label:'WhatsApp', icon:'💬', linkPrefix:'https://wa.me/' },
      { type:'telegram', label:'Telegram', icon:'✈️', linkPrefix:'https://t.me/' },
      { type:'email', label:'Email', icon:'✉️', linkPrefix:'mailto:' },
      { type:'viber', label:'Viber', icon:'📳', linkPrefix:'viber://chat?number=' },
      { type:'instagram', label:'Instagram', icon:'📸', linkPrefix:'https://instagram.com/' },
    ];

    function render() {
      panel.innerHTML = `<div class="admin-panel">
        <div class="panel-title"><i class="fas fa-comments"></i> Contact Side Panel</div>
        <div class="panel-desc">A floating contact widget shown on every page.</div>
        <div class="form-grid">
          <div class="input-group"><label>Label</label><input id="sp-label" value="${escapeHtml(cfg.label)}"></div>
          <div class="input-group"><label>Accent Color</label><input id="sp-color" type="color" value="${cfg.color}"></div>
          <div class="input-group"><label>Position</label>
            <select id="sp-position">
              <option value="right" ${cfg.position==='right'?'selected':''}>Right</option>
              <option value="left" ${cfg.position==='left'?'selected':''}>Left</option>
            </select>
          </div>
          <div class="input-group"><label>Enabled</label><div class="checkbox-row"><input type="checkbox" id="sp-enabled" ${cfg.enabled?'checked':''}><span>Show on site</span></div></div>
        </div>
        <div style="font-weight:700;margin:20px 0 12px;font-family:var(--font-head);color:var(--gold);">Contact Channels</div>
        <div id="sp-channels"></div>
        <button id="save-sp-btn" class="btn-primary" style="margin-top:20px;"><i class="fas fa-save"></i> Save Side Panel</button>
      </div>`;

      document.getElementById('sp-channels').innerHTML = CONTACT_CHANNELS.map(ch => {
        const saved = (cfg.channels || []).find(c => c.type === ch.type) || { enabled:false, value:'' };
        return `<div class="checkbox-row" style="margin-bottom:14px;">
          <input type="checkbox" class="sp-ch-enabled" data-type="${ch.type}" ${saved.enabled?'checked':''}>
          <span style="font-size:20px;width:28px;">${ch.icon}</span>
          <span style="min-width:90px;font-weight:600;">${ch.label}</span>
          <input class="sp-ch-value" data-type="${ch.type}" value="${escapeHtml(saved.value||'')}" placeholder="Contact value (number, username, email...)" style="flex:1;">
        </div>`;
      }).join('');

      document.getElementById('save-sp-btn').addEventListener('click', async () => {
        const newCfg = {
          enabled: document.getElementById('sp-enabled').checked,
          position: document.getElementById('sp-position').value,
          label: document.getElementById('sp-label').value,
          color: document.getElementById('sp-color').value,
          channels: CONTACT_CHANNELS.map(ch => ({
            type: ch.type, label: ch.label, icon: ch.icon, linkPrefix: ch.linkPrefix,
            enabled: document.querySelector(`.sp-ch-enabled[data-type="${ch.type}"]`).checked,
            value: document.querySelector(`.sp-ch-value[data-type="${ch.type}"]`).value,
          })),
        };
        await saveSidepanel(newCfg);
        cfg = newCfg;
      });
    }
    render();
  }

  // ===== INIT =====
  if (authToken) fetchAllData(); else renderLogin();
</script>
