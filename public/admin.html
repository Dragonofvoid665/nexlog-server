<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>NexLog Admin — Control Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --navy: #0A1628; --navy2: #0F2040; --gold: #C9922A; --gold2: #E8B84B;
      --white: #F8F6F1; --gray: #A8A89E; --dark: #050E1A; --card-bg: #0D1E35;
      --border: rgba(201,146,42,0.2);
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --transition: 0.25s ease;
    }
    body { background: var(--navy); color: var(--white); font-family: var(--font-body); font-weight: 400; line-height: 1.5; }
    .admin-wrapper { max-width: 1400px; margin: 0 auto; padding: 24px 32px 60px; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; padding-bottom: 24px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
    .logo-area { display: flex; align-items: center; gap: 12px; }
    .logo-mark { width: 44px; height: 44px; background: linear-gradient(135deg, var(--gold), var(--gold2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: var(--font-head); font-weight: 800; font-size: 20px; color: var(--dark); }
    .logo-text { font-family: var(--font-head); font-weight: 700; font-size: 20px; }
    .logo-text span { color: var(--gold2); }
    .admin-badge { background: var(--gold); color: var(--dark); padding: 6px 14px; border-radius: 40px; font-size: 12px; font-weight: 600; letter-spacing: 0.5px; }
    .logout-btn { background: transparent; border: 1px solid var(--border); color: var(--gray); padding: 8px 20px; border-radius: 30px; font-weight: 500; cursor: pointer; transition: var(--transition); font-family: var(--font-body); }
    .logout-btn:hover { border-color: var(--gold); color: var(--gold); }
    .tabs-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 36px; background: rgba(5, 14, 26, 0.6); padding: 8px 12px; border-radius: 60px; backdrop-filter: blur(4px); border: 1px solid var(--border); }
    .tab-btn { background: transparent; border: none; color: var(--gray); font-family: var(--font-head); font-weight: 600; font-size: 13px; letter-spacing: 0.5px; padding: 10px 24px; border-radius: 40px; cursor: pointer; transition: var(--transition); }
    .tab-btn i { margin-right: 8px; }
    .tab-btn.active { background: var(--gold); color: var(--dark); box-shadow: 0 4px 12px rgba(201,146,42,0.3); }
    .admin-panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 28px 32px; margin-bottom: 20px; box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3); }
    .panel-title { font-family: var(--font-head); font-weight: 700; font-size: 22px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
    .panel-desc { color: var(--gray); font-size: 13px; margin-bottom: 28px; border-left: 3px solid var(--gold); padding-left: 16px; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 28px; }
    .input-group { display: flex; flex-direction: column; gap: 8px; }
    .input-group label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; color: var(--gold); }
    input, textarea, select { background: var(--navy); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; color: var(--white); font-family: var(--font-body); font-size: 14px; transition: var(--transition); }
    input:focus, textarea:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 2px rgba(201,146,42,0.2); }
    textarea { resize: vertical; min-height: 80px; }
    button.btn-primary { background: var(--gold); border: none; color: var(--dark); font-family: var(--font-head); font-weight: 700; padding: 12px 28px; border-radius: 40px; cursor: pointer; transition: var(--transition); font-size: 14px; display: inline-flex; align-items: center; gap: 8px; }
    button.btn-primary:hover { background: var(--gold2); transform: translateY(-2px); }
    button.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--gray); padding: 8px 18px; border-radius: 40px; cursor: pointer; transition: var(--transition); }
    button.btn-outline:hover { border-color: var(--gold); color: var(--gold); }
    .dynamic-list { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 24px; }
    .list-item-card { background: rgba(10,22,40,0.6); border-radius: 20px; padding: 16px 20px; margin-bottom: 16px; border: 1px solid var(--border); display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 15px; }
    .item-preview { flex: 2; min-width: 180px; }
    .item-actions { display: flex; gap: 12px; }
    .icon-btn { background: none; border: none; color: var(--gray); font-size: 18px; cursor: pointer; transition: var(--transition); }
    .icon-btn.danger:hover { color: #e34d4d; }
    .icon-btn:hover { color: var(--gold); }
    .add-new-btn { margin: 16px 0 8px; width: 100%; background: rgba(201,146,42,0.1); border: 1px dashed var(--border); border-radius: 60px; padding: 12px; text-align: center; color: var(--gold); font-weight: 600; cursor: pointer; }
    .image-preview { width: 60px; height: 60px; object-fit: cover; border-radius: 12px; background: var(--dark); border: 1px solid var(--border); }
    .toast-msg { position: fixed; bottom: 24px; right: 24px; background: var(--gold); color: var(--dark); padding: 12px 24px; border-radius: 40px; font-weight: 600; z-index: 2000; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px);} to { opacity: 1; transform: translateY(0);} }
    .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--navy); }
    .login-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 32px; padding: 48px 40px; width: 400px; max-width: 90%; text-align: center; }
    hr { border-color: var(--border); margin: 18px 0; }
    @media (max-width: 700px) { .admin-wrapper { padding: 16px; } .admin-panel { padding: 20px; } }
    .lang-tab-btn:hover { border-color: var(--gold) !important; color: var(--gold) !important; }
    input[type="color"] { cursor: pointer; border: 1px solid var(--border); background: var(--navy); }
  </style>
</head>
<body>
<div id="app-root"></div>

<script>
  let authToken = localStorage.getItem('admin_token') || null;
  let currentTab = 'site';
  let state = {
    site: null, heroSlides: [], stats: [], about: null, services: [], news: [], partners: [], contact: null,
    languages: {}, sidepanel: null
  };

  function showMessage(msg, isError = false) {
    const root = document.getElementById('app-root');
    const toast = document.createElement('div');
    toast.className = 'toast-msg';
    toast.style.background = isError ? '#B33A3A' : 'var(--gold)';
    toast.style.color = '#fff';
    toast.innerText = msg;
    root.appendChild(toast);
    setTimeout(() => toast.remove(), 2800);
  }

  async function apiCall(endpoint, options = {}) {
    const headers = { 'Content-Type': 'application/json' };
    if (authToken && !endpoint.includes('/login')) headers['Authorization'] = `Bearer ${authToken}`;
    const config = { ...options, headers };
    const res = await fetch(endpoint, config);
    if (res.status === 401) {
      localStorage.removeItem('admin_token');
      authToken = null;
      renderLogin();
      throw new Error('Session expired');
    }
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || 'Request failed');
    }
    return res.json();
  }

  async function uploadImage(file) {
    const formData = new FormData();
    formData.append('image', file);
    const res = await fetch('/api/admin/upload', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${authToken}` },
      body: formData
    });
    if (!res.ok) throw new Error('Upload failed');
    const data = await res.json();
    return data.url;
  }

  async function fetchAllData() {
    try {
      const [content, langs, sidepanel] = await Promise.all([
        apiCall('/api/content'),
        apiCall('/api/languages'),
        apiCall('/api/sidepanel')
      ]);
      state.site = content.site;
      state.heroSlides = content.hero.slides;
      state.stats = content.stats;
      state.about = content.about;
      state.services = content.services;
      state.news = content.news;
      state.partners = content.partners;
      state.contact = content.contact;
      state.languages = langs;
      state.sidepanel = sidepanel;
      renderAdminPanel();
    } catch (err) {
      showMessage('Error loading data: ' + err.message, true);
    }
  }

  async function saveSite(data) { await apiCall('/api/admin/site', { method: 'PUT', body: JSON.stringify(data) }); showMessage('Site saved'); fetchAllData(); }
  async function saveHero(slides) { await apiCall('/api/admin/hero', { method: 'PUT', body: JSON.stringify({ slides }) }); showMessage('Hero saved'); fetchAllData(); }
  async function saveStats(stats) { await apiCall('/api/admin/stats', { method: 'PUT', body: JSON.stringify(stats) }); showMessage('Stats saved'); fetchAllData(); }
  async function saveAbout(about) { await apiCall('/api/admin/about', { method: 'PUT', body: JSON.stringify(about) }); showMessage('About saved'); fetchAllData(); }
  async function saveServices(services) { await apiCall('/api/admin/services', { method: 'PUT', body: JSON.stringify(services) }); showMessage('Services saved'); fetchAllData(); }
  async function saveNews(news) { await apiCall('/api/admin/news', { method: 'PUT', body: JSON.stringify(news) }); showMessage('News saved'); fetchAllData(); }
  async function savePartners(partners) { await apiCall('/api/admin/partners', { method: 'PUT', body: JSON.stringify(partners) }); showMessage('Partners saved'); fetchAllData(); }
  async function saveContact(contact) { await apiCall('/api/admin/contact', { method: 'PUT', body: JSON.stringify(contact) }); showMessage('Contact saved'); fetchAllData(); }
  async function saveLanguages(langs) { await apiCall('/api/admin/languages', { method: 'PUT', body: JSON.stringify(langs) }); showMessage('Languages saved'); fetchAllData(); }
  async function saveSidepanel(cfg) { await apiCall('/api/admin/sidepanel', { method: 'PUT', body: JSON.stringify(cfg) }); showMessage('Side panel saved'); fetchAllData(); }
  async function changeAdminPassword(newPass) { await apiCall('/api/admin/change-password', { method: 'POST', body: JSON.stringify({ newPassword: newPass }) }); showMessage('Password changed'); }

  function renderLogin() {
    const root = document.getElementById('app-root');
    root.innerHTML = `
      <div class="login-container">
        <div class="login-card">
          <div class="logo-area" style="justify-content: center; margin-bottom: 28px;"><div class="logo-mark">NL</div><div class="logo-text">NexLog <span>Admin</span></div></div>
          <h3 style="font-family: var(--font-head); margin-bottom: 16px;">🔐 Secure Access</h3>
          <input type="password" id="admin-password" placeholder="Enter password" style="width:100%; margin-bottom: 20px;">
          <button class="btn-primary" id="login-btn" style="width:100%; justify-content:center;"><i class="fas fa-lock"></i> Login</button>
          <hr><p style="font-size: 12px; color: var(--gray);">Default: <strong style="color:var(--gold)">password</strong></p>
        </div>
      </div>`;
    document.getElementById('login-btn').addEventListener('click', async () => {
      const pwd = document.getElementById('admin-password').value;
      if (!pwd) return showMessage('Enter password', true);
      try {
        const res = await fetch('/api/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pwd }) });
        if (!res.ok) throw new Error('Invalid credentials');
        const data = await res.json();
        authToken = data.token;
        localStorage.setItem('admin_token', authToken);
        showMessage('Login success');
        await fetchAllData();
      } catch (err) { showMessage('Login failed: ' + err.message, true); }
    });
  }

  function renderAdminPanel() {
    const root = document.getElementById('app-root');
    root.innerHTML = `
      <div class="admin-wrapper">
        <div class="admin-header"><div class="logo-area"><div class="logo-mark">NL</div><div class="logo-text">NexLog <span>Admin Core</span></div><div class="admin-badge"><i class="fas fa-shield-alt"></i> CMS</div></div><button class="logout-btn" id="global-logout"><i class="fas fa-sign-out-alt"></i> Logout</button></div>
        <div class="tabs-bar" id="tabs-container"></div>
        <div id="dynamic-panel"></div>
      </div>`;
    const tabs = [
      { id: 'site', label: 'Site', icon: 'fa-globe' }, { id: 'hero', label: 'Hero', icon: 'fa-images' }, { id: 'stats', label: 'Stats', icon: 'fa-chart-line' },
      { id: 'about', label: 'About', icon: 'fa-building' }, { id: 'services', label: 'Services', icon: 'fa-boxes' }, { id: 'news', label: 'News', icon: 'fa-newspaper' },
      { id: 'partners', label: 'Partners', icon: 'fa-handshake' }, { id: 'contact', label: 'Contact', icon: 'fa-address-card' }, { id: 'languages', label: 'Languages', icon: 'fa-language' },
      { id: 'sidepanel', label: 'Side Panel', icon: 'fa-comments' }, { id: 'password', label: 'Security', icon: 'fa-key' }
    ];
    const tabsHtml = tabs.map(tab => `<button class="tab-btn ${currentTab === tab.id ? 'active' : ''}" data-tab="${tab.id}"><i class="fas ${tab.icon}"></i> ${tab.label}</button>`).join('');
    document.getElementById('tabs-container').innerHTML = tabsHtml;
    document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => { currentTab = btn.dataset.tab; renderAdminPanel(); }));
    document.getElementById('global-logout')?.addEventListener('click', () => { localStorage.removeItem('admin_token'); authToken = null; renderLogin(); });
    renderCurrentTabContent();
  }

  function renderCurrentTabContent() {
    const panelDiv = document.getElementById('dynamic-panel');
    if (currentTab === 'site') panelDiv.innerHTML = renderSiteEditor();
    if (currentTab === 'hero') panelDiv.innerHTML = renderHeroEditor();
    if (currentTab === 'stats') panelDiv.innerHTML = renderStatsEditor();
    if (currentTab === 'about') panelDiv.innerHTML = renderAboutEditor();
    if (currentTab === 'services') panelDiv.innerHTML = renderArrayEditor('services', state.services, ['title','description','icon','image']);
    if (currentTab === 'news') panelDiv.innerHTML = renderArrayEditor('news', state.news, ['title','date','excerpt','image']);
    if (currentTab === 'partners') panelDiv.innerHTML = renderArrayEditor('partners', state.partners, ['name','logo']);
    if (currentTab === 'contact') panelDiv.innerHTML = renderContactEditor();
    if (currentTab === 'password') panelDiv.innerHTML = renderPasswordEditor();
    if (currentTab === 'languages') { renderLanguagesEditor(panelDiv); return; }
    if (currentTab === 'sidepanel') { renderSidePanelEditor(panelDiv); return; }
    attachUploadTriggers();
  }

  function attachUploadTriggers() {
    document.querySelectorAll('.upload-trigger').forEach(btn => {
      btn.addEventListener('click', async () => {
        const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
        input.onchange = async (e) => {
          const file = e.target.files[0]; if (!file) return;
          try {
            const url = await uploadImage(file);
            const targetId = btn.getAttribute('data-target');
            const targetInput = document.getElementById(targetId);
            if (targetInput) targetInput.value = url;
            const preview = document.getElementById(`preview-${targetId}`);
            if (preview) preview.src = url;
            showMessage('Image uploaded');
          } catch (err) { showMessage('Upload error', true); }
        };
        input.click();
      });
    });
  }

  function renderSiteEditor() {
    return `<div class="admin-panel"><div class="panel-title"><i class="fas fa-cog"></i> General Settings</div><div class="form-grid"><div class="input-group"><label>Company Name</label><input id="site-name" value="${escapeHtml(state.site.companyName)}"></div><div class="input-group"><label>Tagline</label><input id="site-tagline" value="${escapeHtml(state.site.tagline)}"></div></div><button class="btn-primary" id="save-site-btn"><i class="fas fa-save"></i> Save</button></div>`;
  }

  function renderHeroEditor() {
    let slides = state.heroSlides;
    let itemsHtml = slides.map((slide, idx) => `<div class="list-item-card" data-idx="${idx}"><div class="item-preview" style="display:flex; gap:16px;"><img src="${slide.image}" class="image-preview" onerror="this.src='https://placehold.co/400x200'"><div><strong>${escapeHtml(slide.title)}</strong><br><span>${escapeHtml(slide.subtitle)}</span></div></div><div class="item-actions"><button class="icon-btn edit-slide" data-idx="${idx}"><i class="fas fa-pen"></i></button><button class="icon-btn danger remove-slide" data-idx="${idx}"><i class="fas fa-trash"></i></button></div></div>`).join('');
    return `<div class="admin-panel"><div class="panel-title"><i class="fas fa-sliders-h"></i> Hero Slides</div><div id="hero-list">${itemsHtml || '<p>No slides</p>'}</div><div class="add-new-btn" id="add-hero-slide"><i class="fas fa-plus"></i> Add Slide</div><button class="btn-primary" id="save-hero-btn">Save Heroes</button></div>`;
  }

  function renderStatsEditor() { /* аналогично, но для краткости оставлю как в исходнике, но с вызовом saveStats */ return `<div class="admin-panel"><div class="panel-title">Stats Editor</div><div id="stats-list"></div><div class="add-new-btn" id="add-stat">+ Add Stat</div><button id="save-stats-btn" class="btn-primary">Save</button></div>`; }
  function renderAboutEditor() { const a = state.about; return `<div class="admin-panel"><div class="panel-title">About</div><div class="form-grid"><input id="about-title" value="${escapeHtml(a.title)}"><textarea id="about-desc">${escapeHtml(a.description)}</textarea><input id="about-img" value="${escapeHtml(a.image)}"><button class="upload-trigger btn-outline" data-target="about-img">Upload</button></div><button id="save-about-btn" class="btn-primary">Save</button></div>`; }
  function renderContactEditor() { const c = state.contact; return `<div class="admin-panel"><div class="panel-title">Contact</div><div class="form-grid"><input id="contact-address" value="${escapeHtml(c.address)}"><input id="contact-phone" value="${escapeHtml(c.phone)}"><input id="contact-email" value="${escapeHtml(c.email)}"><input id="contact-wa" value="${escapeHtml(c.whatsapp)}"></div><button id="save-contact-btn" class="btn-primary">Save</button></div>`; }
  function renderPasswordEditor() { return `<div class="admin-panel"><div class="panel-title">Change Password</div><input type="password" id="new-pass" placeholder="New password (min 6 chars)"><button id="change-pass-btn" class="btn-primary">Update</button></div>`; }

  function renderArrayEditor(type, items, fields) {
    const containerId = `${type}-editor`;
    setTimeout(() => {
      const container = document.getElementById(containerId);
      if(!container) return;
      const refresh = () => {
        container.innerHTML = items.map((item, idx) => `<div class="list-item-card">${fields.map(f => `<div class="input-group"><label>${f}</label><input id="${type}-${idx}-${f}" value="${escapeHtml(item[f]||'')}"></div>`).join('')}<button class="icon-btn danger remove-${type}" data-idx="${idx}"><i class="fas fa-trash"></i> Remove</button></div>`).join('');
        attachRemoveEvents();
      };
      const attachRemoveEvents = () => document.querySelectorAll(`.remove-${type}`).forEach(btn => btn.addEventListener('click', () => { items.splice(parseInt(btn.dataset.idx),1); refresh(); }));
      refresh();
      document.getElementById(`add-${type}`)?.addEventListener('click', () => { items.push(Object.fromEntries(fields.map(f=>[f,'']))); refresh(); });
      document.getElementById(`save-${type}`)?.addEventListener('click', async () => {
        const updated = items.map((_,idx) => Object.fromEntries(fields.map(f=>[f, document.getElementById(`${type}-${idx}-${f}`)?.value||''])));
        if (type === 'services') await saveServices(updated);
        if (type === 'news') await saveNews(updated);
        if (type === 'partners') await savePartners(updated);
      });
    }, 20);
    return `<div class="admin-panel"><div class="panel-title">${type.toUpperCase()}</div><div id="${containerId}"></div><div class="add-new-btn" id="add-${type}">+ Add</div><button id="save-${type}" class="btn-primary">Save All</button></div>`;
  }

  function renderLanguagesEditor(container) {
    let editingLang = Object.keys(state.languages)[0] || 'en';
    function render() {
      const langs = state.languages;
      container.innerHTML = `<div class="admin-panel"><div class="panel-title"><i class="fas fa-language"></i> Languages</div><div class="panel-desc">Edit translations – saved to server</div><div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;">${Object.entries(langs).map(([code,l]) => `<button class="lang-tab-btn ${code===editingLang?'active':''}" data-code="${code}" style="padding:8px 16px;border-radius:30px;border:1px solid var(--border);background:${code===editingLang?'var(--gold)':'transparent'};color:${code===editingLang?'var(--dark)':'var(--gray)'};cursor:pointer;">${l.flag} ${l.name}</button>`).join('')}<button id="add-lang-btn" style="padding:8px 16px;border-radius:30px;border:1px dashed var(--border);background:transparent;color:var(--gold);">+ Add</button></div><div id="lang-editor-area"></div><div style="margin-top:20px;"><button id="save-langs-btn" class="btn-primary">Save All Languages</button></div></div>`;
      document.querySelectorAll('.lang-tab-btn').forEach(btn => btn.addEventListener('click', () => { editingLang = btn.dataset.code; render(); }));
      document.getElementById('add-lang-btn').addEventListener('click', () => {
        const code = prompt('Language code (en, ru, etc)');
        if(!code) return; const name = prompt('Language name'); if(!name) return; const flag = prompt('Flag emoji', '🌐');
        state.languages[code] = { flag, name, ...Object.fromEntries(LANG_KEYS.map(k=>[k.key,''])) };
        editingLang = code; render();
      });
      const area = document.getElementById('lang-editor-area');
      const current = langs[editingLang] || {};
      area.innerHTML = `<div style="font-weight:700;margin-bottom:16px;">Editing ${current.flag} ${current.name}</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;">${LANG_KEYS.map(({key,label}) => `<div class="input-group"><label>${label}</label><input id="lang-${key}" value="${escapeHtml(current[key]||'')}" placeholder="Translation"></div>`).join('')}</div>`;
      document.getElementById('save-langs-btn').addEventListener('click', async () => {
        const updated = { ...state.languages };
        if(editingLang) {
          const curr = updated[editingLang];
          LANG_KEYS.forEach(({key}) => curr[key] = document.getElementById(`lang-${key}`).value);
        }
        await saveLanguages(updated);
      });
    }
    render();
  }

  function renderSidePanelEditor(container) {
    let cfg = JSON.parse(JSON.stringify(state.sidepanel || { enabled: true, position: 'right', label: 'Contact Us', color: '#C9922A', channels: [] }));
    function render() {
      container.innerHTML = `<div class="admin-panel"><div class="panel-title"><i class="fas fa-comments"></i> Contact Side Panel</div><div class="form-grid"><div class="input-group"><label>Label</label><input id="sp-label" value="${escapeHtml(cfg.label)}"></div><div class="input-group"><label>Color</label><input id="sp-color" type="color" value="${cfg.color}"><input id="sp-color-hex" value="${cfg.color}"></div><div class="input-group"><label>Position</label><select id="sp-position"><option value="right" ${cfg.position==='right'?'selected':''}>Right</option><option value="left" ${cfg.position==='left'?'selected':''}>Left</option></select></div><div class="input-group"><label>Enabled</label><input type="checkbox" id="sp-enabled" ${cfg.enabled?'checked':''}></div></div><div style="font-weight:700;margin:20px 0 12px;">Channels</div><div id="sp-channels"></div><div style="margin-top:20px;"><button id="save-sp-btn" class="btn-primary">Save Side Panel</button></div></div>`;
      const channelsDiv = document.getElementById('sp-channels');
      const CONTACT_CHANNELS = [
        { type:'phone', label:'Phone', icon:'📞', linkPrefix:'tel:' },
        { type:'whatsapp', label:'WhatsApp', icon:'💬', linkPrefix:'https://wa.me/' },
        { type:'telegram', label:'Telegram', icon:'✈️', linkPrefix:'https://t.me/' },
        { type:'email', label:'Email', icon:'✉️', linkPrefix:'mailto:' },
        { type:'viber', label:'Viber', icon:'📳', linkPrefix:'viber://chat?number=' },
        { type:'instagram', label:'Instagram', icon:'📸', linkPrefix:'https://instagram.com/' }
      ];
      channelsDiv.innerHTML = CONTACT_CHANNELS.map(ch => {
        const saved = (cfg.channels || []).find(c=>c.type===ch.type) || { enabled: false, value: '' };
        return `<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;"><input type="checkbox" class="sp-ch-enabled" data-type="${ch.type}" ${saved.enabled?'checked':''}><span style="font-size:20px;">${ch.icon}</span><span style="min-width:70px;">${ch.label}</span><input class="sp-ch-value" data-type="${ch.type}" value="${escapeHtml(saved.value||'')}" placeholder="Contact value" style="flex:1;"></div>`;
      }).join('');
      document.getElementById('save-sp-btn').addEventListener('click', async () => {
        const newCfg = {
          enabled: document.getElementById('sp-enabled').checked,
          position: document.getElementById('sp-position').value,
          label: document.getElementById('sp-label').value,
          color: document.getElementById('sp-color-hex').value,
          channels: CONTACT_CHANNELS.map(ch => ({
            type: ch.type, label: ch.label, icon: ch.icon, linkPrefix: ch.linkPrefix,
            enabled: document.querySelector(`.sp-ch-enabled[data-type="${ch.type}"]`).checked,
            value: document.querySelector(`.sp-ch-value[data-type="${ch.type}"]`).value
          })).filter(c => c.value)
        };
        await saveSidepanel(newCfg);
        cfg = newCfg;
      });
    }
    render();
  }

  const LANG_KEYS = [
    { key:'nav_home', label:'Nav: Home' }, { key:'nav_about', label:'Nav: About' }, { key:'nav_services', label:'Nav: Services' },
    { key:'nav_news', label:'Nav: News' }, { key:'nav_quote', label:'Nav: Quote' }, { key:'eyebrow_who', label:'Who We Are' },
    { key:'eyebrow_offer', label:'What We Offer' }, { key:'eyebrow_updates', label:'Latest Updates' }, { key:'eyebrow_partners', label:'Trusted By' },
    { key:'eyebrow_touch', label:'Get In Touch' }, { key:'sec_about', label:'About' }, { key:'sec_services', label:'Services' },
    { key:'sec_news', label:'News' }, { key:'sec_partners', label:'Partners' }, { key:'cta_title', label:'CTA Title' },
    { key:'cta_sub', label:'CTA Sub' }, { key:'cta_btn', label:'CTA Button' }, { key:'about_btn', label:'About Button' },
    { key:'slide_tag', label:'Hero Tag' }, { key:'footer_services', label:'Footer Services' }, { key:'footer_company', label:'Footer Company' },
    { key:'footer_team', label:'Team' }, { key:'footer_careers', label:'Careers' }, { key:'footer_news', label:'News' },
    { key:'footer_contact', label:'Contact' }, { key:'years', label:'Years Badge' }
  ];

  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' })[m]); }

  // Обработчики кнопок (в конце)
  setTimeout(() => {
    if (currentTab === 'site') document.getElementById('save-site-btn')?.addEventListener('click', () => saveSite({ companyName: document.getElementById('site-name').value, tagline: document.getElementById('site-tagline').value }));
    if (currentTab === 'about') document.getElementById('save-about-btn')?.addEventListener('click', () => saveAbout({ title: document.getElementById('about-title').value, description: document.getElementById('about-desc').value, image: document.getElementById('about-img').value }));
    if (currentTab === 'contact') document.getElementById('save-contact-btn')?.addEventListener('click', () => saveContact({ address: document.getElementById('contact-address').value, phone: document.getElementById('contact-phone').value, email: document.getElementById('contact-email').value, whatsapp: document.getElementById('contact-wa').value }));
    if (currentTab === 'password') document.getElementById('change-pass-btn')?.addEventListener('click', async () => { const p = document.getElementById('new-pass').value; if(p.length<6) showMessage('Min 6 chars',true); else await changeAdminPassword(p); });
    if (currentTab === 'hero') {
      document.getElementById('add-hero-slide')?.addEventListener('click', () => { state.heroSlides.push({ title:'New', subtitle:'Slide', image:'/uploads/placeholder.jpg', buttonText:'Explore', buttonLink:'#contact' }); renderHeroEditor(); renderCurrentTabContent(); });
      document.getElementById('save-hero-btn')?.addEventListener('click', async () => await saveHero(state.heroSlides));
      document.body.addEventListener('click', (e) => {
        if(e.target.closest('.remove-slide')) { const idx = e.target.closest('.remove-slide').dataset.idx; state.heroSlides.splice(parseInt(idx),1); renderHeroEditor(); renderCurrentTabContent(); }
        if(e.target.closest('.edit-slide')) { const idx = e.target.closest('.edit-slide').dataset.idx; const s = state.heroSlides[parseInt(idx)]; s.title = prompt('Title', s.title) || s.title; s.subtitle = prompt('Subtitle', s.subtitle) || s.subtitle; s.image = prompt('Image URL', s.image) || s.image; renderHeroEditor(); renderCurrentTabContent(); }
      });
    }
    if (currentTab === 'stats') {
      let stats = state.stats;
      const renderStats = () => {
        const container = document.getElementById('stats-list');
        if(!container) return;
        container.innerHTML = stats.map((s,i) => `<div class="list-item-card"><div class="form-grid"><input id="stat-icon-${i}" value="${escapeHtml(s.icon)}"><input id="stat-value-${i}" value="${escapeHtml(s.value)}"><input id="stat-label-${i}" value="${escapeHtml(s.label)}"></div><button class="icon-btn danger remove-stat" data-idx="${i}">Remove</button></div>`).join('');
        document.querySelectorAll('.remove-stat').forEach(btn => btn.addEventListener('click', (e) => { stats.splice(parseInt(btn.dataset.idx),1); renderStats(); }));
      };
      renderStats();
      document.getElementById('add-stat')?.addEventListener('click', () => { stats.push({ icon:'🌟', value:'100+', label:'New' }); renderStats(); });
      document.getElementById('save-stats-btn')?.addEventListener('click', async () => { const updated = stats.map((_,i) => ({ icon:document.getElementById(`stat-icon-${i}`).value, value:document.getElementById(`stat-value-${i}`).value, label:document.getElementById(`stat-label-${i}`).value })); await saveStats(updated); });
    }
  }, 50);

  if (authToken) fetchAllData(); else renderLogin();
</script>
</body>
</html>
